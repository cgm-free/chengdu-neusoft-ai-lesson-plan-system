<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6FB1FF"/>
      <stop offset="48%" stop-color="#2F7BFF"/>
      <stop offset="100%" stop-color="#1557E8"/>
    </linearGradient>

    <linearGradient id="book" x1="142" y1="174" x2="370" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DCEBFF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0A3D9C" flood-opacity="0.28"/>
    </filter>

    <style>
      .nsu {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <!-- App background -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <path d="M110 98 C190 52 320 58 402 140" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.18"/>

  <!-- Lesson document card -->
  <rect x="112" y="128" width="288" height="256" rx="42" fill="#FFFFFF" opacity="0.18"/>
  <rect x="136" y="152" width="240" height="208" rx="30" fill="#FFFFFF" opacity="0.22"/>

  <!-- Open book / lesson plan symbol -->
  <path d="M150 188
           C184 168 219 168 256 193
           V326
           C219 301 184 301 150 322
           Z"
        fill="url(#book)"/>
  <path d="M362 188
           C328 168 293 168 256 193
           V326
           C293 301 328 301 362 322
           Z"
        fill="url(#book)"/>

  <!-- Book center fold -->
  <path d="M256 194 V326" stroke="#2E73F6" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

  <!-- Lesson lines -->
  <rect x="174" y="218" width="58" height="10" rx="5" fill="#2E73F6" opacity="0.45"/>
  <rect x="174" y="246" width="44" height="10" rx="5" fill="#2E73F6" opacity="0.35"/>
  <rect x="280" y="218" width="58" height="10" rx="5" fill="#2E73F6" opacity="0.45"/>
  <rect x="280" y="246" width="44" height="10" rx="5" fill="#2E73F6" opacity="0.35"/>

  <!-- NSU brand text -->
  <text x="256" y="418" text-anchor="middle" class="nsu" font-size="76" fill="#FFFFFF">NSU</text>

  <!-- AI sparkle / smart generation -->
  <circle cx="374" cy="126" r="20" fill="#BFD7FF"/>
  <path d="M374 94 L381 118 L405 126 L381 134 L374 158 L367 134 L343 126 L367 118 Z"
        fill="#FFFFFF" opacity="0.95"/>
</svg>